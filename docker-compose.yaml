services:
  backend:
    build: ./app/backend
    ports:
      - "5050:5050" 
    networks:
      - app
    environment:
      MONGO_URI: mongodb://mongo:27017/mydatabase  
    depends_on:
      - mongodb
  frontend:
    build: ./app/frontend
    ports:
      - "5173:5173"  
    networks:
      - app
    environment:
      REACT_APP_API_URL: http://backend:5050 

  mongodb:
    build: ./app
    ports:
      - "27017:27017"  
    networks:
      - app
    volumes:
      - mongo-data:/data/db  

networks:
  app:
    driver: bridge 

volumes:
  mongo-data:
    driver: local  # Persist MongoDB data locally